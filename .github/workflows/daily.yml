name: Daily Problem Assignment

on:
  schedule:
    - cron: "30 1 * * *"   # 1:30 UTC = 7:00 AM IST
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write
  issues: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Planner Agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python agent/planner.py

      - name: Commit stub + progress.json
        run: |
          git config user.name "codesprint-ai-bot"
          git config user.email "actions@users.noreply.github.com"
          git add solutions/pending progress.json
          git diff --cached --quiet || git commit -m "chore: assign today's problem"
          git push
